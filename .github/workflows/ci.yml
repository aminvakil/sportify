name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    if: github.event_name == 'push' || github.event.pull_request.user.login == github.repository_owner
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Docker Compose user ids
        run: |
          echo "UID=$(id -u)" >> "$GITHUB_ENV"
          echo "GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Prepare Symfony parameters
        env:
          FOOTBALL_DATA_API_TOKEN: ${{ secrets.FOOTBALL_DATA_API_TOKEN }}
        run: |
          test -n "$FOOTBALL_DATA_API_TOKEN"
          cp docker/symfony/parameters.yml app/config/parameters.yml
          sed -i "s/football_api.token: check_the_README_file/football_api.token: '$FOOTBALL_DATA_API_TOKEN'/" app/config/parameters.yml

      - name: Build Docker images
        run: docker compose build

      - name: Install PHP dependencies
        run: docker compose run --rm php composer install --no-interaction --no-progress

      - name: Build frontend assets
        run: |
          docker compose run --rm node npm install
          docker compose run --rm node bower install
          docker compose run --rm node gulp

      - name: Run Symfony and Doctrine smoke checks
        run: |
          docker compose run --rm php php bin/console cache:clear --env=test
          docker compose run --rm php php bin/console cache:clear --env=dev
          docker compose run --rm php php bin/console doctrine:database:create --if-not-exists
          docker compose run --rm php php bin/console doctrine:schema:validate --skip-sync
          docker compose run --rm php php bin/console doctrine:schema:update --force
          docker compose run --rm php php bin/console doctrine:schema:validate

      - name: Run PHPUnit
        run: docker compose run --rm php vendor/bin/simple-phpunit --testsuite 'Project Test Suite'

      - name: HTTP smoke test
        run: |
          docker compose up -d php
          for i in $(seq 1 10); do
            if curl -fsSI --max-time 10 http://localhost:8000/app_dev.php/; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs php
          exit 1

