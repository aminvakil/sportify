services:
  init:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
      target: php
    command: ["sportify-prod-init"]
    environment:
      SYMFONY_ENV: prod
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - bundle-assets:/app/web/bundles
      - prod-cache:/app/var/cache
    restart: "no"

  php:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
      target: php
    environment:
      SYMFONY_ENV: prod
    depends_on:
      init:
        condition: service_completed_successfully
    volumes:
      - bundle-assets:/app/web/bundles
      - prod-cache:/app/var/cache
    expose:
      - "9000"
    restart: unless-stopped

  httpd:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
      target: httpd
    depends_on:
      php:
        condition: service_started
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - bundle-assets:/app/web/bundles:ro
    restart: unless-stopped

  db:
    image: mysql:9.7
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    env_file:
      - .env
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -P 3306 -u\"$${MYSQL_USER}\" -p\"$${MYSQL_PASSWORD}\""]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  bundle-assets:
  prod-cache:
  db-data:
