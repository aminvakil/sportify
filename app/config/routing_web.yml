    path: /admin/tournaments
    defaults: { _controller: Devlabs\SportifyBundle\Controller\AdminController::tournamentsAction }

admin_tournaments_modify:
    path: /admin/tournaments/modify
    defaults: { _controller: Devlabs\SportifyBundle\Controller\AdminController::tournamentModifyAction }

