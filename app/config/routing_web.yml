    path: /admin/teams
    defaults: { _controller: Devlabs\SportifyBundle\Controller\AdminController::teamsAction }

admin_teams_modify:
    path: /admin/teams/modify
    defaults: { _controller: Devlabs\SportifyBundle\Controller\AdminController::teamModifyAction }

admin_matches:
    path: /admin/matches/{tournament_id}/{date_from}/{date_to}
    defaults: { _controller: Devlabs\SportifyBundle\Controller\AdminController::matchesAction, tournament_id: empty, date_from: empty, date_to: empty }

admin_matches_modify:
    path: /admin/matches_modify/{tournament_id}/{date_from}/{date_to}
    defaults: { _controller: Devlabs\SportifyBundle\Controller\AdminController::matchModifyAction, tournament_id: empty, date_from: empty, date_to: empty }

champion_index:
    path: /champion/{tournament_id}
    defaults: { _controller: Devlabs\SportifyBundle\Controller\ChampionController::indexAction, tournament_id: empty }

home:
    path: /
    defaults: { _controller: Devlabs\SportifyBundle\Controller\DefaultController::indexAction }

history_index:
    path: /history/{user_id}/{tournament_id}/{date_from}/{date_to}
    defaults: { _controller: Devlabs\SportifyBundle\Controller\HistoryController::indexAction, user_id: empty, tournament_id: empty, date_from: empty, date_to: empty }

matches_index:
    path: /matches/{action}/{tournament_id}/{date_from}/{date_to}
    defaults: { _controller: Devlabs\SportifyBundle\Controller\MatchesController::indexAction, action: index, tournament_id: empty, date_from: empty, date_to: empty }
    requirements: { action: index }

matches_bet:
    path: /matches/{action}/{tournament_id}/{date_from}/{date_to}
    defaults: { _controller: Devlabs\SportifyBundle\Controller\MatchesController::betAction, action: bet, tournament_id: empty, date_from: empty, date_to: empty }
    requirements: { action: bet }

matches_betall:
    path: /matches/betall
    defaults: { _controller: Devlabs\SportifyBundle\Controller\MatchesController::betAllAction }

rules_index:
    path: /rules
    defaults: { _controller: Devlabs\SportifyBundle\Controller\RulesController::indexAction }

scores_update_all:
    path: /scores/update/all
    defaults: { _controller: Devlabs\SportifyBundle\Controller\ScoresUpdateController::updateAllAction }

scores_update_user_pos_tournament:
    path: /scores/update/user-positions-tournament/{tournament_id}
    defaults: { _controller: Devlabs\SportifyBundle\Controller\ScoresUpdateController::updateUserPositionsForTournamentAction }

standings_index:
    path: /standings/{tournament_id}
    defaults: { _controller: Devlabs\SportifyBundle\Controller\StandingsController::indexAction, tournament_id: empty }

standing_index:
    path: /standing/{tournament_id}
    defaults: { _controller: Devlabs\SportifyBundle\Controller\StandingsController::index2Action, tournament_id: empty }

tournaments_index:
    path: /tournaments
    defaults: { _controller: Devlabs\SportifyBundle\Controller\TournamentsController::indexAction }

user_profile:
    path: /user/profile
    defaults: { _controller: Devlabs\SportifyBundle\Controller\UserController::profileAction }

user_tokens:
    path: /user/tokens
    defaults: { _controller: Devlabs\SportifyBundle\Controller\UserController::tokensAction }
