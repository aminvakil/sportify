    defaults: { _controller: Devlabs\SportifyBundle\Controller\AdminController::scoringAction }

admin_data_updates_match_fixtures:
    path: /admin/data_updates/match_fixtures
    defaults: { _controller: Devlabs\SportifyBundle\Controller\AdminController::matchFixturesUpdateAction }

admin_data_updates_match_results:
    path: /admin/data_updates/match_results
    defaults: { _controller: Devlabs\SportifyBundle\Controller\AdminController::matchResultsUpdateAction }

admin_data_updates_teams:
    path: /admin/data_updates/teams
    defaults: { _controller: Devlabs\SportifyBundle\Controller\AdminController::teamsUpdateAction }

admin_api_mappings:
    path: /admin/api_mappings
    defaults: { _controller: Devlabs\SportifyBundle\Controller\AdminController::apiMappingAction }

admin_api_mappings_modify:
    path: /admin/api_mappings/modify
