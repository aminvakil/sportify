# To get started with security, check out the documentation:
# http://symfony.com/doc/current/book/security.html
security:

    password_hashers:
        Devlabs\SportifyBundle\Entity\User: bcrypt

    role_hierarchy:
        ROLE_ADMIN:       ROLE_USER
        ROLE_SUPER_ADMIN: ROLE_ADMIN

    providers:
        app_user_provider:
            id: app.user_provider

    firewalls:
        # disables authentication for assets and the profiler, adapt it according to your needs
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        oauth_token:
            pattern:      ^/oauth/v2/token
            security:     false

        api_doc:
            pattern:      ^/api/doc
            security:     false

        api:
            pattern:      ^/api/
            provider: app_user_provider
            user_checker: app.user_checker
            stateless:    true
            custom_authenticators:
                - app.oauth_token_authenticator
            entry_point: app.oauth_token_authenticator

        main:
            pattern: ^/
            user_checker: app.user_checker
            form_login:
                provider: app_user_provider
                login_path: fos_user_security_login
                check_path: fos_user_security_check
                enable_csrf: true
            logout:
                path: fos_user_security_logout
                target: home
            remember_me:
                secret:   A3mkS!24D@11WjLg7OI9#Zzx%7fBNS
                lifetime: 7776000 # 90 days in seconds
                path:     /
                domain:   ~

            # activate different ways to authenticate

            # http_basic: ~
            # http://symfony.com/doc/current/book/security.html#a-configuring-how-your-users-will-authenticate

            # form_login: ~
            # http://symfony.com/doc/current/cookbook/security/form_login_setup.html
    access_control:
        - { path: ^/login$, role: PUBLIC_ACCESS }
        - { path: ^/register, role: PUBLIC_ACCESS }
        - { path: ^/resetting, role: PUBLIC_ACCESS }
        - { path: ^/standings, role: PUBLIC_ACCESS }
        - { path: ^/admin/, role: ROLE_ADMIN }
        - { path: ^/api$, role: PUBLIC_ACCESS }
        - { path: ^/api, roles: [ IS_AUTHENTICATED_FULLY ] }
